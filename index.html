<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Management System</title>
  <link rel="stylesheet" href="s.css">
  <script defer src="script.js"></script>
</head>
<body>

  <header>
    <h1>Welcome to <br> Equitable Village National High School</h1>
    <h2 class="lrc-title">LRC - Library Resource Center</h2>
  </header>

  <main>
    <h2>Sign in here.</h2>
    <form id="student-form">
      <label for="student-name">Full Name (Surname, First Name, Middle Name):</label>
      <input type="text" id="student-name" required placeholder="Gosling, Ryan, T.">
      
      <label for="student-grade">Grade:</label>
      <select id="student-grade" required>
        <option value="" disabled selected>Select Grade</option>
        <option value="7">Grade 7</option>
        <option value="8">Grade 8</option>
        <option value="9">Grade 9</option>
        <option value="10">Grade 10</option>
      </select>

      <label for="student-section">Section:</label>
      <input type="text" id="student-section" required placeholder="Enter your section">

      <label for="book-title">Select a Book:</label>
      <select id="book-title">
        <!-- Books will be dynamically added here -->
      </select>

      <button type="submit">Borrow Book</button>
    </form>

    <button class="admin-btn" onclick="location.href='admin.html'">Admin Login</button>
  </main>

  <footer>
    <p><strong>LRC - Library Resource Center</strong></p>
  </footer>

</body>
</html>
