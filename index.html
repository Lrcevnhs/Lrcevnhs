<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Management System</title>
  <link rel="stylesheet" href="s.css">
  <script defer src="script.js"></script>
</head>
<body>

  <header>
    <h1>Welcome to Equitable Village National High School</h1>
    <h2 class="lrc-title">LRC - Library Resource Center</h2>
  </header>

  <main>
    <h2>Sign in your name here.</h2>
    <form id="student-form">
      <label for="student-name">Full Name:</label>
      <input type="text" id="student-name" required>
      
      <label for="student-grade">Grade & Section:</label>
      <input type="text" id="student-grade" required>

      <label for="book-title">Select a Book:</label>
      <select id="book-title">
        <!-- Books will be dynamically added here -->
      </select>

      <button type="submit">Borrow Book</button>
    </form>

    <button class="admin-btn" onclick="location.href='admin.html'">Admin Login</button>
  </main>

  <footer>
    <p><strong>LRC - Library Resource Center</strong></p>
  </footer>

</body>
</html>
