<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="s.css">
  <script defer src="script.js"></script>
</head>
<body>

  <header>
    <h1>Library Admin Panel</h1>
  </header>

  <main id="admin-login-section">
    <h2>Admin Login</h2>
    <form id="admin-login-form">
      <label for="admin-email">Email:</label>
      <input type="email" id="admin-email" required>

      <label for="admin-password">Password:</label>
      <input type="password" id="admin-password" required>

      <button type="submit">Login</button>
    </form>
  </main>

  <section id="admin-dashboard" style="display: none;">
    <h2>Manage Books</h2>
    <form id="add-book-form">
      <label for="book-name">Book Name:</label>
      <input type="text" id="book-name" required>

      <label for="book-author">Author:</label>
      <input type="text" id="book-author" required>

      <label for="book-genre">Genre:</label>
      <input type="text" id="book-genre" required>

      <button type="submit">Add Book</button>
    </form>

    <h3>Book List</h3>
    <ul id="book-list"></ul>

    <h2>Borrowed Books</h2>
    <table id="borrowed-books-table">
      <thead>
        <tr>
          <th>Student Name</th>
          <th>Grade & Section</th>
          <th>Book Title</th>
          <th>Date Borrowed</th>
          <th>Return Status</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <footer>
    <p><strong>Library Management System - Admin Panel</strong></p>
  </footer>

</body>
</html>
