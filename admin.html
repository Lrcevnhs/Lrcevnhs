<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRC History</title>
    <link rel="stylesheet" href="s.css">
    <script defer src="script.js"></script>
</head>
<body>
    <header>
        <h1>LRC History</h1>
    </header>

    <main>
        <img src="imgss.png" alt="School Logo" class="background-logo">

        <h2>Manage Books</h2>
        <form id="add-book-form">
            <label for="book-name">Book Title:</label>
            <input type="text" id="book-name" required>

            <label for="author-name">Author:</label>
            <input type="text" id="author-name" required>

            <button type="submit">Add Book</button>
        </form>

        <h2>Borrowed Books</h2>
        <table id="borrowed-books-table">
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Grade</th>
                    <th>Section</th>
                    <th>Book Title</th>
                    <th>Author</th>
                    <th>Date Borrowed</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h3>Data will be deleted in: <span id="countdown-timer"></span></h3>
        <button onclick="location.href='index.html'">Back to Main Page</button>
    </main>
</body>
</html>
