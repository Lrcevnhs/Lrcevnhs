<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link rel="stylesheet" href="s.css">
  <script defer src="admin.js"></script>
</head>
<body>

  <header>
    <h1>Admin Panel - Library Management</h1>
  </header>

  <main>
    <h2>Manage Books</h2>
    <form id="add-book-form">
      <label for="book-name">Book Name:</label>
      <input type="text" id="book-name" required>

      <label for="author-name">Author:</label>
      <input type="text" id="author-name" required>

      <button type="submit">Add Book</button>
    </form>

    <h2>Book List</h2>
    <table id="book-list">
      <thead>
        <tr>
          <th>Title</th>
          <th>Author</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <h2>Students Data</h2>
    <table id="borrowed-books-table">
      <thead>
        <tr>
          <th>Student Name</th>
          <th>Grade</th>
          <th>Section</th>
          <th>Book Title</th>
          <th>Author</th>
          <th>Date Borrowed</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <footer>
    <p><strong>Library Admin Panel</strong></p>
  </footer>

</body>
</html>
