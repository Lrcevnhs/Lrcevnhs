<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borrow/Return</title>
    <link rel="stylesheet" href="s.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Borrow or Return a Book</h1>
    <input type="text" id="studentName" placeholder="Enter Full Name">
    <button onclick="checkStudent()">Proceed</button>
    <div id="actionSection" style="display: none;">
        <button onclick="showBorrow()">Borrow a Book</button>
        <button onclick="showReturn()">Return a Book</button>
    </div>
    <div id="borrowSection" style="display: none;">
        <input type="text" id="searchBook" placeholder="Search for a Book">
        <button onclick="borrowBook()">Borrow</button>
    </div>
    <div id="returnSection" style="display: none;">
        <p>Books You Borrowed:</p>
        <select id="borrowedBooks"></select>
        <button onclick="returnBook()">Return</button>
    </div>
    <button onclick="location.href='index.html'">Back to Main Page</button>
</body>
</html>
